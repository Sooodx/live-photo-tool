name: Publish Docker Image

# 打 tag（如 v1.0.0、v1.0.0-rc1）时触发，构建多架构镜像并推送到 Docker Hub
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像 tag（默认 latest）"
        required: false
        default: "latest"

# 同一 tag 并发只保留最后一次
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 设置 QEMU（多架构构建所需）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 计算镜像 tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "image_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # 从 git tag（v1.2.3）去掉前缀 v
            ref="${GITHUB_REF##*/}"
            tag="${ref#v}"
            echo "image_tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: 构建并推送（amd64 + arm64）
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sooodx/live-photo-tool:${{ steps.meta.outputs.image_tag }}
            sooodx/live-photo-tool:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
